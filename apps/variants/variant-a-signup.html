<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase — Create Account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }

    .site-nav { background: white; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 60px; position: sticky; top: 0; z-index: 50; }
    .nav-logo { font-size: 22px; font-weight: 800; color: #6366f1; text-decoration: none; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 14px; color: #555; text-decoration: none; font-weight: 500; transition: color .15s; }
    .nav-links a:hover { color: #6366f1; }
    .btn-nav { background: #6366f1; color: white !important; padding: 9px 22px; border-radius: 8px; font-weight: 600 !important; }

    main { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 60px); padding: 40px 20px; }
    .card { background: white; border-radius: 16px; padding: 44px; width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .logo { font-size: 22px; font-weight: 800; color: #6366f1; margin-bottom: 28px; }
    h1 { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .subtitle { color: #777; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
    input { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; font-size: 15px; outline: none; margin-bottom: 20px; transition: border-color .15s; }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    button[type="submit"] { width: 100%; background: #6366f1; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
    button[type="submit"]:hover { background: #4f46e5; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
    .footer-link a { color: #6366f1; text-decoration: none; font-weight: 500; }
    #success { text-align: center; padding: 20px 0; }
    .check { font-size: 52px; margin-bottom: 16px; }
    #success h2 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 10px; }
    #success p { color: #777; font-size: 14px; }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="variant-a.html" id="nav-home" class="nav-logo">ShopEase</a>
    <div class="nav-links">
      <a href="variant-a-about.html" id="nav-about">About</a>
      <a href="variant-a.html#pricing-section" id="nav-pricing">Pricing</a>
      <a href="variant-a-signup.html" id="nav-signup" class="btn-nav">Sign Up</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <div class="logo">ShopEase</div>

      <div id="form-view">
        <h1>Create your account</h1>
        <p class="subtitle">Get access to exclusive member deals</p>

        <form id="signup-form">
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">

          <label for="password">Password</label>
          <input id="password" type="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password">

          <button type="submit" id="cta">Create Account</button>
        </form>

        <p class="footer-link">Already have an account? <a href="#">Sign in</a></p>
      </div>

      <div id="success" style="display:none">
        <div class="check">✓</div>
        <h2>Welcome to ShopEase!</h2>
        <p id="welcome-msg">Your account is ready. Start saving today.</p>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function (e) {
      e.preventDefault()
      const email = document.getElementById('email').value
      document.getElementById('form-view').style.display = 'none'
      document.getElementById('success').style.display = 'block'
      document.getElementById('welcome-msg').textContent = `Account created for ${email}. Start saving today.`
    })
  </script>
</body>
</html>
